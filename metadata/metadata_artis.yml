    # Taxonomic coverage (OPTIONAL, repeatable)
    taxonomicCoverage:
      # A description of the range of taxa addressed 
      # in the data set or collection. Example "All vascular plants were identified to 
      # family or species, mosses and lichens were identified as moss or lichen."
      - generalTaxonomicCoverage: "2000+ farmed and wild capture aquatic species which in 
          turn were matched to 900+ traded seafood product descriptions. Though we include 
          nonfood (e.g., fish meal, bait, and ornamental trade) production and trade in the 
          database, we exclude this from the analysis of aquatic food production and consumption. 
          We also exclude mammals, reptiles, fowl, or seaweeds, along with co-products 
          (e.g., caviar, shark fins, and fish meat) to avoid double counting, from the model 
          and resulting database."  
        taxonomicClassification:
          - taxonRankName: "Kingdom"
            taxonRankValue: "Animalia"
            # taxonomicClassification:
